version: '3.8'

services:
  web:
    build: .
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - androboss_media:/app/androboss_media
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    command:
      - certonly
      - --webroot
      - --webroot-path=/var/www/certbot
      - --email
      - abdufattohfattoyev0@gmail.com
      - --agree-tos
      - --no-eff-email
      - --force-renewal
      - -d
      - sebmarket.uz
      - -d
      - www.sebmarket.uz
      - -d
      - andro-boss.uz
      - -d
      - www.andro-boss.uz
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  static_volume:
  media_volume:
  androboss_media:
  certbot_www:

networks:
  app-network:
    driver: bridge
